<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>点滴ドロップ計算器 Pro | 安心・確実な滴下管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        medical: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            transition: background-color 0.3s ease;
        }
        .glass-card {
            transition: all 0.3s ease;
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .rhythm-active {
            box-shadow: 0 0 20px 4px rgba(14, 165, 233, 0.6);
            background-color: #0ea5e9 !important;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex flex-col items-center p-4 sm:p-8">
    <!-- Top Controls -->
    <div class="w-full max-w-md flex justify-end mb-4">
        <button onclick="toggleDarkMode()" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300">
            <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>
    </div>

    <div class="w-full max-w-md space-y-6">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white tracking-tight">点滴ドロップ計算器 Pro</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">確実でスマートな、安心の滴下管理のために</p>
        </header>

        <!-- Mode Toggle Tabs -->
        <div class="flex bg-slate-200 dark:bg-slate-800 p-1 rounded-2xl">
            <button onclick="setMode('standard')" id="tab-standard" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white dark:bg-sky-600 shadow-sm text-sky-600 dark:text-white">
                基本計算
            </button>
            <button onclick="setMode('residual')" id="tab-residual" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500 dark:text-slate-400">
                残量から計算
            </button>
        </div>

        <!-- Main Form Card -->
        <main class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-xl border border-slate-100 dark:border-slate-800 space-y-6">
            
            <!-- Standard Mode Inputs -->
            <div id="inputs-standard" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">輸液総量 (ml)</label>
                        <input type="number" id="vol-std" inputmode="decimal" placeholder="500" class="w-full text-xl font-bold p-4 bg-slate-50 dark:bg-slate-800 dark:text-white border-2 border-transparent rounded-2xl focus:border-sky-400 outline-none transition-all" oninput="calculate()">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">予定時間 (h)</label>
                        <input type="number" id="time-std" inputmode="decimal" placeholder="8" class="w-full text-xl font-bold p-4 bg-slate-50 dark:bg-slate-800 dark:text-white border-2 border-transparent rounded-2xl focus:border-sky-400 outline-none transition-all" oninput="calculate()">
                    </div>
                </div>
            </div>

            <!-- Residual Mode Inputs (Hidden by default) -->
            <div id="inputs-residual" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">残量 (ml)</label>
                        <input type="number" id="vol-res" inputmode="decimal" placeholder="200" class="w-full text-xl font-bold p-4 bg-slate-50 dark:bg-slate-800 dark:text-white border-2 border-transparent rounded-2xl focus:border-sky-400 outline-none transition-all" oninput="calculate()">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">現在の滴下数 (滴/分)</label>
                        <input type="number" id="rate-res" inputmode="decimal" placeholder="20" class="w-full text-xl font-bold p-4 bg-slate-50 dark:bg-slate-800 dark:text-white border-2 border-transparent rounded-2xl focus:border-sky-400 outline-none transition-all" oninput="calculate()">
                    </div>
                </div>
            </div>

            <!-- Drip Set & Start Time Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">点滴セット</label>
                    <select id="dripSet" onchange="calculate()" class="w-full text-lg font-bold p-4 bg-slate-50 dark:bg-slate-800 dark:text-white border-2 border-transparent rounded-2xl focus:border-sky-400 outline-none transition-all appearance-none">
                        <option value="20">成人 (20滴)</option>
                        <option value="60">小児 (60滴)</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-1">開始/現在時刻</label>
                    <input type="time" id="startTime" class="w-full text-lg font-bold p-4 bg-slate-50 dark:bg-slate-800 dark:text-white border-2 border-transparent rounded-2xl focus:border-sky-400 outline-none transition-all" oninput="calculate()">
                </div>
            </div>

            <!-- Main Results Area -->
            <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
                <div class="text-center mb-6">
                    <span id="result-label" class="text-xs font-bold text-sky-500 uppercase tracking-widest">1分間の滴下数</span>
                    <div class="flex items-baseline justify-center gap-2 mt-1">
                        <span id="main-result" class="text-7xl font-black text-slate-900 dark:text-white">0</span>
                        <span id="main-unit" class="text-2xl font-bold text-slate-300 dark:text-slate-600">滴</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-sky-50 dark:bg-sky-900/30 rounded-2xl p-4 flex flex-col items-center justify-center space-y-2">
                        <span class="text-[10px] font-bold text-sky-600 dark:text-sky-400 uppercase">滴下リズム</span>
                        <div id="rhythmDot" class="w-6 h-6 rounded-full bg-sky-200 dark:bg-sky-800"></div>
                        <span class="text-xs font-bold text-sky-800 dark:text-sky-200"><span id="sec-res">0</span>秒/滴</span>
                    </div>
                    <div class="bg-emerald-50 dark:bg-emerald-900/30 rounded-2xl p-4 flex flex-col items-center justify-center space-y-2">
                        <span class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase">終了予定時刻</span>
                        <span id="time-res" class="text-2xl font-black text-emerald-800 dark:text-emerald-200">--:--</span>
                        <span class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400">あと <span id="remain-txt">0時間0分</span></span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="text-center space-y-2 px-6">
            <p class="text-[10px] text-slate-400 dark:text-slate-600">※ 計算結果は目安です。必ず最終的な確認を指示書と共に行ってください。</p>
        </footer>
    </div>

    <script>
        let currentMode = 'standard';
        let rhythmInterval = null;

        // Initialize time
        const setNow = () => {
            const now = new Date();
            document.getElementById('startTime').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        };
        setNow();

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('sunIcon').classList.toggle('hidden', isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', !isDark);
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('inputs-standard').classList.toggle('hidden', mode !== 'standard');
            document.getElementById('inputs-residual').classList.toggle('hidden', mode !== 'residual');
            
            // Tab styling
            const btnStd = document.getElementById('tab-standard');
            const btnRes = document.getElementById('tab-residual');
            
            if (mode === 'standard') {
                btnStd.className = "flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white dark:bg-sky-600 shadow-sm text-sky-600 dark:text-white";
                btnRes.className = "flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500 dark:text-slate-400";
                document.getElementById('result-label').innerText = "1分間の滴下数";
                document.getElementById('main-unit').innerText = "滴";
            } else {
                btnRes.className = "flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white dark:bg-sky-600 shadow-sm text-sky-600 dark:text-white";
                btnStd.className = "flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500 dark:text-slate-400";
                document.getElementById('result-label').innerText = "完了までの時間";
                document.getElementById('main-unit').innerText = "";
            }
            calculate();
        }

        function calculate() {
            const dripSet = parseInt(document.getElementById('dripSet').value);
            const startTimeStr = document.getElementById('startTime').value;
            
            let dropsPerMin = 0;
            let durationHours = 0;
            let secondsPerDrop = 0;

            if (currentMode === 'standard') {
                const vol = parseFloat(document.getElementById('vol-std').value);
                const hours = parseFloat(document.getElementById('time-std').value);
                if (vol > 0 && hours > 0) {
                    dropsPerMin = (vol * dripSet) / (hours * 60);
                    durationHours = hours;
                    document.getElementById('main-result').innerText = Math.round(dropsPerMin);
                } else {
                    resetDisplay();
                    return;
                }
            } else {
                const vol = parseFloat(document.getElementById('vol-res').value);
                const rate = parseFloat(document.getElementById('rate-res').value);
                if (vol > 0 && rate > 0) {
                    // Time = (Vol * DripSet) / Rate / 60
                    durationHours = (vol * dripSet) / rate / 60;
                    dropsPerMin = rate;
                    
                    const h = Math.floor(durationHours);
                    const m = Math.round((durationHours % 1) * 60);
                    document.getElementById('main-result').innerText = `${h}h${m}m`;
                } else {
                    resetDisplay();
                    return;
                }
            }

            // Common Calculations
            secondsPerDrop = 60 / dropsPerMin;
            document.getElementById('sec-res').innerText = secondsPerDrop.toFixed(1);

            // End Time
            if (startTimeStr) {
                const [sH, sM] = startTimeStr.split(':').map(Number);
                const date = new Date();
                date.setHours(sH, sM, 0);
                const endDate = new Date(date.getTime() + durationHours * 60 * 60 * 1000);
                document.getElementById('time-res').innerText = endDate.getHours().toString().padStart(2, '0') + ':' + endDate.getMinutes().toString().padStart(2, '0');
                
                const h = Math.floor(durationHours);
                const m = Math.round((durationHours % 1) * 60);
                document.getElementById('remain-txt').innerText = `${h}時間${m}分`;
            }

            startRhythm(secondsPerDrop);
        }

        function startRhythm(seconds) {
            if (rhythmInterval) clearInterval(rhythmInterval);
            const dot = document.getElementById('rhythmDot');
            const tick = () => {
                dot.classList.add('rhythm-active');
                setTimeout(() => dot.classList.remove('rhythm-active'), 150);
            };
            tick();
            rhythmInterval = setInterval(tick, seconds * 1000);
        }

        function resetDisplay() {
            document.getElementById('main-result').innerText = '0';
            document.getElementById('time-res').innerText = '--:--';
            document.getElementById('remain-txt').innerText = '0時間0分';
            document.getElementById('sec-res').innerText = '0';
            if (rhythmInterval) clearInterval(rhythmInterval);
        }

        // Prevent non-numeric chars
        document.querySelectorAll('input[type="number"]').forEach(el => {
            el.addEventListener('keydown', e => { if (['e', 'E', '+', '-'].includes(e.key)) e.preventDefault(); });
        });
    </script>
</body>
</html>
